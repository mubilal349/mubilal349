<!DOCTYPE html>
<html>
    <head>
        <title>Login-form</title>
        <style>
            h3{
                border: 2px solid aqua;
                padding-left: 10%;
                padding-right: 10%;
                text-align: center;
            }
        </style>
    </head>
    <body bgcolor="slateblue">
        <form>
            <fieldset align="center">
                <img src="russia-95.webp" alt="russia-95" width="200px"><br>
                <img src="emplye.jpg" alt="emplye" width="200px" height="90px">
                <legend>Employee-survey form</legend>
                <h3 style=background-color:blue;>Employee-survey form</h3><br><br>
                <video controls loop autoplay muted>
                    <source src="employee survey.mp4" alt="employee survey">
                </video><br><br>
                <label>FULL-NAME:</label>
                <input type="txt" id="Full-name" value="" name="Full-name" placeholder="Full-name"><br><br>
                <label>ENTER YOUR DEPARTMENT:</label>
                <input type="txt" id="department" value="" name="department" placeholder="department"><br><br>
                <label>EMAIL:</label>
                <input type="txt" id="Email" value="" name="Email" placeholder="Email"><br><br>
                <label>PASSWORD:</label>
                <input type="txt" id="Password" value="" name="Password" placeholder="Password"><br><br>
                <label>CONFIRM-PASSWORD:</label>
                <input type="txt" id="Password" value="" name="Password" placeholder="confirm-Password"><br><br>
                <label>Phone no +92:</label>
                <input type="txt" id="Phone no" value="" placeholder="Phone no" name="Phone no"><br><br>
                <label>ZIP-CODE:</label>
                <input type="txt" id="zip-code" value="" name="zip-code" placeholder="zip-code"> <hr align="center" width="30%"><br><br>
                <label>select state.</label>
                <select name="state" placeholder="select state">
                    <option value="" selected disabled>select state:</option>
                    <option value="">KPK</option>
                    <option value="">PUNJAB</option>
                    <option value="">SINDH</option>
                    <option value="">BALOCHISTAN</option>
                    <option value="">GILGIT</option>
                    <option value="" disabled>Others</option>
                    </select><br><br>
                <label>select Qualification.</label>
                <select name="Qualification" placeholder="select Qualification">
                    <option value="" selected disabled>select Qualification:</option>
                    <option value="">Graduate</option>
                    <option value="">Under Graduate</option>
                    <option value="">Matric/secondary</option>
                    <option value="">Student</option>
                    <option value="">Self-employee</option>
                    <option value="">Others</option>
                    </select><br><br>
                 select gender:
                <input type="radio" value="" name="gender" placeholder="Male" id="Male">
                <label for="Male">Male</label>
                <input type="radio" value="" name="gender" placeholder="Female" id="Female">
                <label for="Female">Female</label>
                <input type="radio" value="" name="gender" placeholder="Others" id="Others">
                <label for="Others">others</label><br><br>
                <label>select country.</label>
                <select name="country" placeholder="select country">
                <option value="" selected disabled>select country:</option>
                <option value="">Pakistan</option>
                <option value="">UAE</option>
                <option value="">KSA</option>
                <option value="" disabled>India</option>
                <option value="">Russia</option>
                <option value="">USA</option>
                </select><br><br>
                Which one are you interesting:
                <input type="radio" id="part time-job" value=""  name="interesting" placeholder="part time-job">
                <label for="part time-job">part time-job</label>
                <input type="radio" id="online-job" value="" name="interesting" placeholder="online-job">
                <label for="online-job">online-job</label>
                <br><br>
                Did you exercise at Home?
                <input type="radio" id="yes" value="" id="yes" name="exercise" placeholder="yes">
                <label for="yes">yes</label>
                <input type="radio" id="no" value="" id="no" name="exercise" placeholder="no">
                <label for="no">no</label><br><br>
                <label for="Favorite-colour">select your Favorite-colour:</label>
                <input type="color" id="color" value="" name="color" ><br><br>
                <label>UPLOAD YOUR CV:</label>
                <input type="file" id="file" value="" name="file" placeholder="file"><br><br>
                <textarea for="tell a little about yourself:">Tell yourself.</textarea><br><br>
                <input type="submit" value="submit">
                <input type="reset" value="reset">
                <input type="button" value="cancel">
                <input type="button" onclick="alert('THis login-form is about Employee-survey.')" value="click here"><br><br>
                <a href="https://www.websiteplanet.com">Here to go to planet website</a><br><br>
                <p>Welcome to Employee-survey form.</p>
                <footer>
                    <small>&copy;copyright.All right reserved.&reg;</small>
                </footer>
            </fieldset>
        </form>
    </body>
</html>
