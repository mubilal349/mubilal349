<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My snake game</title>
    <style>
        *{
            box-sizing: border-box;
        }
        body{
            margin: 0;
            padding: 0;
        }
        .container{
            width: 100%;
            height: 100vh;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .game-board{
            height: 90vmin;
            width: 90vmin;
            background: linear-gradient(orange, yellow);
            grid-template-columns: repeat(16,1fr);
            grid-template-rows: repeat(16,1fr);
        }
        .score-board{
            background: yellow;
            padding: 10px 20px;
            border-radius: 20px;
            width: 20%;
            height: 2em;
            margin: auto;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-transform: capitalize;
            
        }
        .snake-head{
            background: url(snake\head.jpg);
            background-size: 100% 100%;
        }
        .fruit{
            background-image: url(/apple.jpg);
            background-size: 100% 100% ;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="game-board">
         <div class="score-board">score : <span>0</span>
            <div class="snake-head"></div>
            <div class="fruit"></div>
        </div>
       </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
